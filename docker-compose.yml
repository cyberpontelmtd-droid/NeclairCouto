services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: neclaircouto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: neclaircouto
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neclaircouto"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3002"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgres://neclaircouto:${POSTGRES_PASSWORD}@db:5432/neclaircouto
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - ./data/uploads:/app/data/uploads

volumes:
  db-data:
